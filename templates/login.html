<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="header">
      <h1>VIDYA VATIKA PUBLIC SCHOOL</h1>
      <p>Teacher Login Portal</p>
    </div>

    <div class="login-box">
      <h2>🔐 Teacher Login</h2>

      <form action="/" method="post">
        <input
          type="text"
          name="username"
          placeholder="Username"
          required
        /><br /><br />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        /><br /><br />
        <button class="submit-btn">Login</button>
      </form>
    </div>
  </body>
</html>
